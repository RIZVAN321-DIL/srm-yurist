<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Юрист</title>
    <link rel="manifest" href="/static/manifest.json">
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #1a1d2e;
            --text-secondary: #64748b;
            --sidebar: #0f172a;
            --accent: #c9a96e;
            --accent-hover: #b8944f;
            --danger: #ef4444;
            --success: #10b981;
            --info: #3b82f6;
            --warning: #f59e0b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
            --radius: 14px;
            --radius-sm: 10px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.dark {
            --bg: #0f1119;
            --card: #1a1d28;
            --text: #e8ecf2;
            --text-secondary: #8896a8;
            --sidebar: #080c14;
            --border: #272b36;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
            --shadow: 0 4px 16px rgba(0,0,0,0.3);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        
        /* LOGIN OVERLAY */
        .login-overlay {
            display: flex; position: fixed; inset: 0; z-index: 9999;
            background: linear-gradient(145deg, #0f172a 0%, #1a2740 40%, #0f172a 100%);
            justify-content: center; align-items: center;
        }
        .login-overlay::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(201,169,110,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 80%, rgba(201,169,110,0.05) 0%, transparent 60%);
        }
        .login-box {
            position: relative; background: var(--card); padding: 52px 44px;
            border-radius: 22px; width: 90%; max-width: 450px; text-align: center;
            box-shadow: 0 24px 80px rgba(0,0,0,0.45);
            animation: fadeUp 0.55s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-logo { font-size: 52px; margin-bottom: 8px; display: block; }
        .login-box h2 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); margin-bottom: 4px; }
        .login-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 32px; }
        .login-box input {
            width: 100%; padding: 15px 18px; margin: 8px 0;
            border: 2px solid var(--border); border-radius: 12px;
            font-size: 15px; background: var(--bg); color: var(--text);
            transition: all var(--transition);
        }
        .login-box input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(201,169,110,0.1); }
        .login-box button {
            width: 100%; padding: 16px; margin-top: 14px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            color: #0f172a; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            transition: all var(--transition); letter-spacing: 0.3px;
        }
        .login-box button:hover {
            transform: translateY(-2px); box-shadow: 0 8px 28px rgba(201,169,110,0.45);
        }
        .login-error { color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 20px; }

        /* LAYOUT */
        .app-layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 260px; background: var(--sidebar); color: #fff;
            padding: 28px 18px; display: flex; flex-direction: column; gap: 6px;
            position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
            box-shadow: 4px 0 24px rgba(0,0,0,0.25);
            transition: transform 0.3s ease;
        }
        .sidebar-brand { text-align: center; margin-bottom: 28px; }
        .sidebar-brand .icon { font-size: 40px; display: block; }
        .sidebar-brand .title { font-size: 20px; font-weight: 800; color: var(--accent); margin-top: 4px; letter-spacing: -0.3px; }
        .sidebar-brand .ver { font-size: 10px; color: #5a6478; margin-top: 2px; font-weight: 500; }
        .sidebar a {
            color: #b0b8c8; text-decoration: none; padding: 13px 18px;
            border-radius: 11px; display: flex; align-items: center; gap: 14px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all var(--transition); letter-spacing: 0.2px;
        }
        .sidebar a:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .sidebar a.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: #0f172a; font-weight: 700; box-shadow: 0 4px 16px rgba(201,169,110,0.35);
        }
        .sidebar a .nav-icon { font-size: 18px; width: 24px; text-align: center; }
        .sidebar .spacer { flex: 1; }
        .logout-btn {
            background: rgba(239,68,68,0.1); color: var(--danger);
            border: 1px solid rgba(239,68,68,0.2); padding: 13px;
            border-radius: 11px; cursor: pointer; font-weight: 700; font-size: 14px;
            text-align: center; transition: all var(--transition);
        }
        .logout-btn:hover { background: rgba(239,68,68,0.2); }

        .main {
            margin-left: 260px; flex: 1; padding: 36px 40px;
            min-height: 100vh; overflow-y: auto;
        }

        /* TOPBAR */
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 36px; flex-wrap: wrap; gap: 16px;
        }
        .topbar-left h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.6px; }
        .topbar-left .date { font-size: 13px; color: var(--text-secondary); margin-top: 3px; font-weight: 500; }
        .topbar-right { display: flex; gap: 10px; align-items: center; }
        .theme-btn {
            background: var(--card); border: 2px solid var(--border); color: var(--text);
            padding: 11px 16px; border-radius: 11px; cursor: pointer; font-size: 18px;
            transition: all var(--transition);
        }
        .theme-btn:hover { border-color: var(--accent); }

        .btn {
            padding: 11px 22px; border: none; border-radius: 11px;
            cursor: pointer; font-size: 14px; font-weight: 700;
            transition: all var(--transition); letter-spacing: 0.3px;
            display: inline-flex; align-items: center; gap: 7px;
        }
        .btn-accent { background: linear-gradient(135deg, var(--accent), var(--accent-hover)); color: #0f172a; }
        .btn-accent:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,169,110,0.35); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--accent); }
        .btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 8px; }

        /* STATS ROW */
        .stats-row {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; margin-bottom: 32px;
        }
        .stat-card {
            background: var(--card); padding: 26px 24px; border-radius: var(--radius);
            box-shadow: var(--shadow); border: 1px solid var(--border);
            transition: all var(--transition); position: relative; overflow: hidden;
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .stat-card .stat-icon { font-size: 36px; margin-bottom: 12px; display: block; }
        .stat-card .stat-value { font-size: 34px; font-weight: 800; letter-spacing: -1.5px; line-height: 1; }
        .stat-card .stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
        .stat-card.accent { border-left: 5px solid var(--accent); }
        .stat-card.info { border-left: 5px solid var(--info); }
        .stat-card.success { border-left: 5px solid var(--success); }
        .stat-card.warning { border-left: 5px solid var(--warning); }

        /* CONTENT CARD */
        .content-card {
            background: var(--card); border-radius: var(--radius);
            box-shadow: var(--shadow); border: 1px solid var(--border);
            padding: 28px; animation: fadeUp 0.4s ease;
        }
        .content-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .content-card h3 .section-icon { font-size: 22px; }

        /* TOOLBAR */
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .toolbar input {
            flex: 1; min-width: 200px; padding: 13px 18px;
            border: 2px solid var(--border); border-radius: 11px;
            font-size: 14px; background: var(--bg); color: var(--text);
            transition: all var(--transition);
        }
        .toolbar input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(201,169,110,0.08); }

        /* TABLE */
        .table-wrap { overflow-x: auto; border-radius: var(--radius-sm); }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: var(--sidebar); color: #b0b8c8; padding: 14px 18px;
            text-align: left; font-weight: 700; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.8px;
        }
        th:first-child { border-radius: 10px 0 0 0; }
        th:last-child { border-radius: 0 10px 0 0; }
        td { padding: 15px 18px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:hover td { background: rgba(201,169,110,0.03); }
        tr:last-child td { border-bottom: none; }

        /* BADGES */
        .badge {
            display: inline-block; padding: 5px 13px; border-radius: 20px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase;
        }
        .badge-new { background: #dbeafe; color: #1e40af; }
        .badge-active { background: #fef3c7; color: #92400e; }
        .badge-closed { background: #d1fae5; color: #065f46; }
        .badge-overdue { background: #fee2e2; color: #991b1b; }
        body.dark .badge-new { background: #1e3a5f; color: #93c5fd; }
        body.dark .badge-active { background: #4a3a14; color: #fcd34d; }
        body.dark .badge-closed { background: #1a3d2a; color: #6ee7b7; }
        body.dark .badge-overdue { background: #4a1a1a; color: #fca5a5; }

        .empty-state { text-align: center; padding: 48px 24px; color: var(--text-secondary); }
        .empty-state .empty-icon { font-size: 52px; margin-bottom: 14px; display: block; }
        .empty-state p { font-size: 15px; font-weight: 500; }

        /* MODAL */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.55); justify-content: center; align-items: center;
            backdrop-filter: blur(2px);
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: var(--card); padding: 34px; border-radius: 18px;
            width: 90%; max-width: 560px; max-height: 85vh; overflow-y: auto;
            box-shadow: var(--shadow-lg); animation: fadeUp 0.3s ease; color: var(--text);
        }
        .modal-box h2 { font-size: 22px; font-weight: 700; margin-bottom: 22px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-weight: 700; margin-bottom: 6px;
            font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.7px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 13px 16px; border: 2px solid var(--border);
            border-radius: 11px; font-size: 15px; background: var(--bg); color: var(--text);
            font-family: inherit; transition: all var(--transition);
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(201,169,110,0.08);
        }
        .form-group textarea { min-height: 90px; resize: vertical; }
        .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 28px; }

        .text-link { color: var(--info); cursor: pointer; font-weight: 700; text-decoration: none; }
        .text-link:hover { text-decoration: underline; }
        .text-muted { color: var(--text-secondary); font-size: 13px; }
        .mb-4 { margin-bottom: 16px; }
        .mt-2 { margin-top: 8px; }
        .gap-2 { gap: 8px; }

        @media (max-width: 1024px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main { margin-left: 0; padding: 20px; }
            .stats-row { grid-template-columns: 1fr; }
            .topbar { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <span class="login-logo">⚖️</span>
        <h2>CRM Юрист</h2>
        <p class="login-subtitle">Управляйте практикой эффективно</p>
        <input type="text" id="loginInput" placeholder="Логин" autocomplete="username">
        <input type="password" id="passInput" placeholder="Пароль" autocomplete="current-password">
        <button onclick="App.doLogin()">Войти в систему</button>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<!-- APP -->
<div class="app-layout" id="appLayout" style="display:none">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <span class="icon">⚖️</span>
            <div class="title">CRM Юрист</div>
            <div class="ver">v6.3.1</div>
        </div>
        <a onclick="App.navigate('dashboard')" data-nav="dashboard" class="active">
            <span class="nav-icon">📊</span> Дашборд
        </a>
        <a onclick="App.navigate('clients')" data-nav="clients">
            <span class="nav-icon">👥</span> Клиенты
        </a>
        <a onclick="App.navigate('cases')" data-nav="cases">
            <span class="nav-icon">📁</span> Дела
        </a>
        <a onclick="App.navigate('users')" data-nav="users">
            <span class="nav-icon">👤</span> Сотрудники
        </a>
        <a onclick="App.navigate('finance')" data-nav="finance">
            <span class="nav-icon">💰</span> Финансы
        </a>
        <div class="spacer"></div>
        <button class="logout-btn" onclick="App.logout()">🚪 Выйти из системы</button>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="topbar">
            <div class="topbar-left">
                <h1 id="pageTitle">📊 Дашборд</h1>
                <div class="date" id="pageDate"></div>
            </div>
            <div class="topbar-right">
                <button class="theme-btn" onclick="App.toggleTheme()" title="Тема">🌓</button>
                <button class="btn btn-accent" id="globalAddBtn" style="display:none" onclick="App.handleGlobalAdd()">+ Добавить</button>
            </div>
        </div>
        <div class="stats-row" id="statsRow"></div>
        <div id="contentArea">
            <div class="content-card"><p>Загрузка...</p></div>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal"><div class="modal-box" id="modalContent"></div></div>

<script src="/static/js/app.js"></script>
</body>
    </html>
